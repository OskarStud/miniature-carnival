<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="gate-active">
  <canvas id="ascii-canvas" aria-hidden="true"></canvas>
  <div id="gate" class="gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
    <div class="gate-panel">
      <h2 id="gate-title" class="gate-heading">Доступ</h2>
      <form id="gate-form" class="gate-form" autocomplete="off">
        <label class="gate-label" for="gate-password">Пароль</label>
        <input id="gate-password" class="gate-input" type="password" name="password" required autofocus />
        <p id="gate-error" class="gate-error" role="alert" aria-live="polite"></p>
        <button type="submit" class="gate-submit">Войти</button>
      </form>
    </div>
  </div>
  <script>
    (function () {
      if (sessionStorage.getItem("mc_gate_unlocked") === "1") {
        document.body.classList.remove("gate-active");
        var g = document.getElementById("gate");
        if (g) g.hidden = true;
      }
    })();
  </script>
  <main>
    <div class="panel">
      <h1>Фон из <span>ASCII</span></h1>
      <p class="meta">canvas - autodeploy</p>
    </div>
  </main>
  <script src="gate.js" defer></script>
  <script src="ascii-bg.js" defer></script>
</body>
</html>
